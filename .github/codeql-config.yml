---
# CodeQL configuration for NuGet Cache Tool
# Suppresses intentional generic catch clauses

name: "NuGet Cache Tool CodeQL Config"

# Query filters to disable specific queries for certain paths
query-filters:
  - exclude:
      id: cs/catch-of-all-exceptions
    paths:
      - src/DemaConsulting.NuGet.CacheTool/Context.cs
      - src/DemaConsulting.NuGet.CacheTool/Validation.cs
  # Exclude path-combine warnings in PathHelpers (validated safe usage)
  - exclude:
      id: cs/path-combine
    paths:
      - src/DemaConsulting.NuGet.CacheTool/PathHelpers.cs
